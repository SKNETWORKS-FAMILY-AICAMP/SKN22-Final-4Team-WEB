# version attribute is obsolete and removed to avoid confusion
services:
  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "80:8000"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=${DB_HOST:-}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_PORT=${DB_PORT:-5432}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEBUG=${DEBUG:-False}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - REDIS_HOST=redis
    depends_on:
      - redis

  celery:
    build: .
    command: sh -c "export PYTHONPATH=$PYTHONPATH:/app && celery -A config worker --loglevel=info --concurrency=1"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=${DB_HOST:-}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_PORT=${DB_PORT:-5432}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEBUG=${DEBUG:-False}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - REDIS_HOST=redis
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
