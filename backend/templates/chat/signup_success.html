{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가입 성공! - 강하리 AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-darker: #13131a;
            --primary-pink: #ff3377;
            --gradient-user: linear-gradient(135deg, #ff4d88 0%, #ca4dfa 100%);
            --text-main: #ffffff;
            --text-muted: #8b8b9a;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(23, 23, 32, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: #4dfa9d;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-user);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 51, 119, 0.4);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2>가입 완료! 🎉</h2>
        <p>이제 하리와의 대화를 시작할 준비가 됐어.<br>오빠, 로그인하러 가자!</p>
        
        <a href="{% url 'login' %}" class="login-btn">로그인하러 가기</a>
    </div>
</body>
</html>
