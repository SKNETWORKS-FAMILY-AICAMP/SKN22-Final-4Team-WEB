{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="안녕! 드디어 나랑 편하게 대화할 수 있는 우리만의 공간이 생겼어. SNS에선 못 했던 솔직한 이야기들, 여기서 다 들려줄게! 지금 로그인하고 들어오면 하리가 먼저 말을 걸어줄지도 몰라. 우리 여기서 만날까?">
    <meta property="og:title" content="회원가입 - 하리 AI">
    <meta property="og:description" content="안녕! 드디어 나랑 편하게 대화할 수 있는 우리만의 공간이 생겼어. SNS에선 못 했던 솔직한 이야기들, 여기서 다 들려줄게! 지금 로그인하고 들어오면 하리가 먼저 말을 걸어줄지도 몰라. 우리 여기서 만날까?">
    <meta property="og:type" content="website">
    <title>회원가입 - 하리 AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-darker: #13131a;
            --primary-pink: #ff3377;
            --gradient-user: linear-gradient(135deg, #ff4d88 0%, #ca4dfa 100%);
            --text-main: #ffffff;
            --text-muted: #8b8b9a;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(23, 23, 32, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-user);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: inline-block;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-pink);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(255, 51, 119, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-user);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 51, 119, 0.4);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--primary-pink);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(255, 51, 119, 0.1);
            color: #ff5588;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .social-btn {
            width: 100%;
            padding: 13px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: background 0.2s ease, border-color 0.2s ease;
            margin-bottom: 12px;
        }

        .social-btn-google {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .social-btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .social-btn-naver {
            background: rgba(3, 199, 90, 0.1);
            color: #03C75A;
            border-color: rgba(3, 199, 90, 0.3);
        }

        .social-btn-naver:hover {
            background: rgba(3, 199, 90, 0.2);
            border-color: rgba(3, 199, 90, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">KANG HARI AI</div>
        <h2>하리랑 친구할래? 🌸</h2>
        <p>회원가입하고 하리랑 비밀 대화를 시작해봐.</p>
        
        <form method="POST">
            {% csrf_token %}
            {% if error %}
            <div class="error-msg" style="display: block;">
                {{ error }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디를 만들어줘" required>
            </div>

            <div class="form-group">
                <label>이메일 (선택)</label>
                <input type="email" name="email" placeholder="이메일을 입력해줘">
            </div>
            
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력해줘" required>
            </div>

            <div class="form-group">
                <label>비밀번호 확인</label>
                <input type="password" name="password_confirm" placeholder="한 번 더 입력해줘" required>
            </div>
            
            <button type="submit" class="login-btn">가입하기</button>
        </form>
        
        <div class="divider">또는 소셜 계정으로 가입</div>

        <a href="/accounts/google/login/?next=/" class="social-btn social-btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Google로 시작하기
        </a>

        <a href="/accounts/naver/login/?next=/" class="social-btn social-btn-naver">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z" fill="#03C75A"/>
            </svg>
            Naver로 시작하기
        </a>

        <div class="auth-links">
            이미 계정이 있어? <a href="{% url 'login' %}">로그인하기</a>
        </div>
    </div>
</body>
</html>
