{% load static %}
<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-profile">
      <div class="profile-img" onclick="openHariProfile()"
           style="background:none; overflow:hidden; border:1px solid var(--border); cursor:pointer; transition:opacity 0.2s;"
           onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">
        <img id="hari-header-profile-img" src="{% static 'images/hari_image19.webp' %}" alt="Hari" style="width:100%; height:100%; object-fit:cover;">
      </div>
      <div class="profile-info" style="cursor:pointer;" onclick="openHariProfile()">
        <div class="profile-name">하리</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <!-- 테마 토글 -->
    <div class="chat-theme-toggle">
      <span class="chat-theme-icon" title="라이트 모드">☀️</span>
      <button id="chat-theme-toggle" class="off" onclick="toggleTheme()" aria-label="다크 모드 전환" title="다크/라이트 모드 전환"></button>
      <span class="chat-theme-icon" title="다크 모드">🌙</span>
    </div>
    <button class="header-btn" onclick="openSearch()">🔍 Search</button>
  </div>
</div>

<!-- ── 카카오톡 스타일 프로필 모달 ── -->
<div id="hari-profile-overlay" onclick="closeHariProfile(event)" style="
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
">
  <!-- 프로필 카드 -->
  <div id="hari-profile-card" style="
    position:relative; z-index:5;
    width:360px; border-radius:24px; overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,0.5);
    animation:profileSlideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  ">
    <!-- 배경 이미지 전체 (클릭 → 크게 보기) -->
    <div id="hari-modal-bg" onclick="openImgViewer(window.hariCurrentBg)" style="
      width:100%; height:560px;
      background-image:url('{% static 'images/hari_image13.png' %}');
      background-size:cover; background-position:center top;
      cursor:zoom-in; position:relative;
    ">
      <!-- 하단 그라데이션 (텍스트 가독성) -->
      <div style="
        position:absolute; inset:0;
        background:linear-gradient(to bottom,
          rgba(0,0,0,0.08) 0%,
          rgba(0,0,0,0.0) 40%,
          rgba(0,0,0,0.45) 75%,
          rgba(0,0,0,0.72) 100%);
      "></div>

      <!-- 닫기 버튼 -->
      <button onclick="event.stopPropagation(); closeHariProfileBtn();" style="
        position:absolute; top:14px; right:14px;
        background:rgba(0,0,0,0.3); border:none;
        width:32px; height:32px; border-radius:50%;
        color:#fff; font-size:0.95rem; cursor:pointer;
        display:flex; align-items:center; justify-content:center;
        backdrop-filter:blur(8px); transition:background 0.2s;
      " onmouseover="this.style.background='rgba(0,0,0,0.5)'"
         onmouseout="this.style.background='rgba(0,0,0,0.3)'">✕</button>

      <!-- 프로필 사진 + 이름/상메 (배경 위에 겹침) -->
      <div style="
        position:absolute; bottom:0; left:0; right:0;
        padding:0 24px 24px;
        display:flex; flex-direction:column; align-items:center;
      ">
        <!-- 프로필 사진 (클릭 → 크게 보기) -->
        <div onclick="event.stopPropagation(); openImgViewer(window.hariCurrentProfile);" style="
          width:80px; height:80px;
          border-radius:22px; overflow:hidden;
          border:2.5px solid rgba(255,255,255,0.9);
          box-shadow:0 6px 20px rgba(0,0,0,0.35);
          margin-bottom:12px; cursor:zoom-in;
          transition:transform 0.2s;
        " onmouseover="this.style.transform='scale(1.05)'"
           onmouseout="this.style.transform='scale(1)'">
          <img id="hari-modal-profile-img" src="{% static 'images/hari_image19.webp' %}" alt="하리"
               style="width:100%; height:100%; object-fit:cover;">
        </div>

        <!-- 이름 -->
        <div style="
          font-size:1.1rem; font-weight:700; color:#fff;
          letter-spacing:-0.01em; margin-bottom:5px;
          text-shadow:0 1px 6px rgba(0,0,0,0.4);
        ">하리 (Hari)</div>

        <!-- 상태메시지 -->
        <div id="hari-status-msg" style="
          font-size:0.78rem; color:rgba(255,255,255,0.85);
          text-shadow:0 1px 4px rgba(0,0,0,0.3);
          margin-bottom:20px;
        ">다음 영상 뭐 하지 🤔</div>

        <!-- 구분선 -->
        <div style="width:100%; height:0.5px; background:rgba(255,255,255,0.25); margin-bottom:20px;"></div>

        <!-- 액션 버튼 -->
        <div style="display:flex; gap:28px; justify-content:center; align-items:flex-start; width:100%; flex-wrap:wrap;">
          <div style="display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; min-width:64px;"
               onclick="event.stopPropagation(); window.open('/abouthari/','_blank','noopener')">
            <div style="
              width:56px; height:56px; border-radius:50%;
              background:rgba(255,255,255,0.15); backdrop-filter:blur(10px);
              display:flex; align-items:center; justify-content:center;
              border:1px solid rgba(255,255,255,0.28);
              transition:background 0.2s, transform 0.2s;
              box-shadow:0 8px 20px rgba(0,0,0,0.12);
            " onmouseover="this.style.background='rgba(255,255,255,0.28)'; this.style.transform='translateY(-1px)'"
               onmouseout="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='translateY(0)'">
              <img src="{% static 'images/hari_favicon.png' %}" alt="Hari" style="width:30px; height:30px; object-fit:contain;">
            </div>
            <span style="font-size:0.6rem; color:rgba(255,255,255,0.82); letter-spacing:0.04em;">프로필</span>
          </div>

          <div style="display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; min-width:64px;"
               onclick="event.stopPropagation(); window.open('https://linktr.ee/chatting_hari','_blank','noopener')">
            <div style="
              width:56px; height:56px; border-radius:50%;
              background:transparent;
              display:flex; align-items:center; justify-content:center;
              border:1px solid rgba(255,255,255,0.28);
              transition:transform 0.2s, border-color 0.2s, background 0.2s;
            " onmouseover="this.style.transform='translateY(-1px)'; this.style.borderColor='rgba(255,255,255,0.45)'; this.style.background='rgba(255,255,255,0.06)'"
               onmouseout="this.style.transform='translateY(0)'; this.style.borderColor='rgba(255,255,255,0.28)'; this.style.background='transparent'">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" aria-hidden="true">
                <path d="M12 4v8" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 8 7.5 4" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 8 16.5 4" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 12 6.5 17.5" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 12 17.5 17.5" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="1.4" fill="#34d399"/>
              </svg>
            </div>
            <span style="font-size:0.6rem; color:rgba(255,255,255,0.82); letter-spacing:0.04em;">SNS 링크</span>
          </div>
        </div>
      </div>
    </div><!-- /배경 이미지 -->
  </div><!-- /hari-profile-card -->
</div><!-- /hari-profile-overlay -->

<!-- ── 이미지 풀사이즈 뷰어 ── -->
<div id="img-viewer-overlay" onclick="closeImgViewer()" style="
  display:none; position:fixed; inset:0; z-index:3000;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; cursor:zoom-out;
">
  <img id="img-viewer-img" src="" alt="" style="
    max-width:90vw; max-height:90vh;
    object-fit:contain; border-radius:12px;
    box-shadow:0 24px 60px rgba(0,0,0,0.6);
    animation:imgViewerIn 0.25s cubic-bezier(0.16,1,0.3,1);
  ">
  <button onclick="closeImgViewer()" style="
    position:absolute; top:20px; right:20px;
    background:rgba(255,255,255,0.15); border:none;
    width:38px; height:38px; border-radius:50%;
    color:#fff; font-size:1.1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(10px); transition:background 0.2s;
  " onmouseover="this.style.background='rgba(255,255,255,0.28)'"
     onmouseout="this.style.background='rgba(255,255,255,0.15)'">✕</button>
</div>

<!-- ── 하리 프로필/배경/상태메시지 순환 시스템 ── -->
<script>
(function () {
  /* 프로필 사진 목록 (3일마다 순환)
   * 기준: 얼굴이 선명하고 중앙에 잘 잡혀 작은 원형 크롭에서도 잘 보이는 사진
   * 8,12,14,15,16,17,19,20,21,22,27,28,29,30 */
  var PROFILE_IMGS = [
    "{% static 'images/hari_image8.png' %}",
    "{% static 'images/hari_image12.png' %}",
    "{% static 'images/hari_image14.png' %}",
    "{% static 'images/hari_image15.png' %}",
    "{% static 'images/hari_image16.png' %}",
    "{% static 'images/hari_image17.png' %}",
    "{% static 'images/hari_image19.webp' %}",
    "{% static 'images/hari_image20.webp' %}",
    "{% static 'images/hari_image21.webp' %}",
    "{% static 'images/hari_image22.webp' %}",
    "{% static 'images/hari_image27.webp' %}",
    "{% static 'images/hari_image28.webp' %}",
    "{% static 'images/hari_image29.webp' %}",
    "{% static 'images/hari_image30.webp' %}"
  ];

  /* 배경 사진 목록 (3일마다 순환)
   * 기준: 모자로 얼굴 가림 / 시선 아래·옆 / 전신+먼거리 → 프로필 사진에 얼굴이 가려지지 않는 사진
   * 1,2,3,4,5,6,7,13,18,23,24,25,26,31 */
  var BG_IMGS = [
    "{% static 'images/hari_image1.png' %}",
    "{% static 'images/hari_image2.png' %}",
    "{% static 'images/hari_image3.png' %}",
    "{% static 'images/hari_image4.png' %}",
    "{% static 'images/hari_image5.png' %}",
    "{% static 'images/hari_image6.png' %}",
    "{% static 'images/hari_image7.png' %}",
    "{% static 'images/hari_image13.png' %}",
    "{% static 'images/hari_image18.webp' %}",
    "{% static 'images/hari_image23.webp' %}",
    "{% static 'images/hari_image24.webp' %}",
    "{% static 'images/hari_image25.webp' %}",
    "{% static 'images/hari_image26.webp' %}",
    "{% static 'images/hari_image31.webp' %}"
  ];

  /* 상태 메시지 목록 (3일마다 순환) */
  var STATUS_MSGS = [
    "다음 영상 뭐 하지 🤔",
    "오늘도 열심히! 💪",
    "AI 공부 중이야 📚",
    "카페에서 작업 중 ☕",
    "새 아이디어 기획 중 💡",
    "촬영 준비 완료 🎬",
    "여러분이랑 얘기하고 싶어 💕",
    "테크 트렌드 공부 중 🤖",
    "오늘 기분 좋아요! 🌸",
    "산책하고 싶다 🌿",
    "영상 편집 중 ✂️",
    "팬들 생각하는 중 💭"
  ];

  /* ── 날짜 기반 결정론적 순환 ──
   * 모든 사용자가 같은 날짜에 동일한 계산 → 항상 같은 결과
   * localStorage 불사용, 서버 불필요 */

  /* 시드 기반 의사난수 (LCG) — Math.random() 대신 사용 */
  function seededRand(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  /* 시드 기반 Fisher-Yates 셔플 — 인덱스 배열 반환 */
  function seededShuffle(len, seed) {
    var a = [];
    for (var i = 0; i < len; i++) a.push(i);
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(seededRand(seed * 9973 + i) * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  /* 날짜 기반 아이템 선택
   * - periodNum  : 오늘이 몇 번째 기간인지 (모든 사용자 동일)
   * - era        : 몇 번째 전체 사이클인지 → 셔플 시드
   * - pos        : 이번 사이클 내 위치 → 인덱스
   * - salt       : 항목 종류마다 셔플이 달라지도록 구분값 */
  function getItem(items, intervalDays, salt) {
    var daysSinceEpoch = Math.floor(Date.now() / (24 * 60 * 60 * 1000));
    var periodNum      = Math.floor(daysSinceEpoch / intervalDays);
    var era            = Math.floor(periodNum / items.length);
    var pos            = periodNum % items.length;
    var shuffled       = seededShuffle(items.length, era + salt);
    return items[shuffled[pos]];
  }

  /* 현재 값 계산 후 전역 변수에 노출
   * salt 값이 다르면 같은 날짜라도 종류별로 다른 셔플 적용 */
  window.hariCurrentProfile = getItem(PROFILE_IMGS, 3,  1);
  window.hariCurrentBg      = getItem(BG_IMGS,      3,  2);
  var hariCurrentStatus     = getItem(STATUS_MSGS,  3,  3);

  /* DOM에 적용 */
  function applyHariProfile() {
    /* 헤더 프로필 썸네일 */
    var headerImg = document.getElementById('hari-header-profile-img');
    if (headerImg) headerImg.src = window.hariCurrentProfile;

    /* 모달 배경 */
    var modalBg = document.getElementById('hari-modal-bg');
    if (modalBg) modalBg.style.backgroundImage = "url('" + window.hariCurrentBg + "')";

    /* 모달 프로필 사진 */
    var modalProfileImg = document.getElementById('hari-modal-profile-img');
    if (modalProfileImg) modalProfileImg.src = window.hariCurrentProfile;

    /* 모달 상태 메시지 */
    var statusEl = document.getElementById('hari-status-msg');
    if (statusEl) statusEl.textContent = hariCurrentStatus;

    /* 왼쪽 사이드바 배경 */
    var sidebarLeft = document.getElementById('hari-sidebar-left');
    if (sidebarLeft) sidebarLeft.style.backgroundImage = "url('" + window.hariCurrentBg + "')";

    /* 왼쪽 사이드바 프로필 사진 */
    var sidebarImg = document.getElementById('hari-sidebar-profile-img');
    if (sidebarImg) sidebarImg.src = window.hariCurrentProfile;

    /* 왼쪽 사이드바 상태 메시지 */
    var sidebarStatus = document.getElementById('hari-sidebar-status');
    if (sidebarStatus) sidebarStatus.textContent = hariCurrentStatus;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyHariProfile);
  } else {
    applyHariProfile();
  }
})();
</script>

<style>
@keyframes profileSlideUp {
  from { opacity:0; transform:translateY(16px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes imgViewerIn {
  from { opacity:0; transform:scale(0.93); }
  to   { opacity:1; transform:scale(1); }
}
</style>

<script>
/* ── 프로필 모달 ── */
function openHariProfile() {
  const overlay = document.getElementById('hari-profile-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => { document.body.style.overflow = 'hidden'; });
}
function closeHariProfileBtn() {
  document.getElementById('hari-profile-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
function closeHariProfile(e) {
  const card = document.getElementById('hari-profile-card');
  if (card && card.contains(e.target)) return;
  closeHariProfileBtn();
}

/* ── 이미지 뷰어 ── */
function openImgViewer(src) {
  const overlay = document.getElementById('img-viewer-overlay');
  const img = document.getElementById('img-viewer-img');
  img.src = src;
  overlay.style.display = 'flex';
}
function closeImgViewer() {
  document.getElementById('img-viewer-overlay').style.display = 'none';
  document.getElementById('img-viewer-img').src = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeImgViewer();
    closeHariProfileBtn();
  }
});
</script>
