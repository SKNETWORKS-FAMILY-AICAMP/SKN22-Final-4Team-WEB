<!-- INPUT AREA (Premium Instagram Style) -->
<div class="input-area" style="display: flex; align-items: flex-end; gap: 12px; background: #f0f2f5; padding: 8px 16px; border-radius: 26px; transition: all 0.3s;">
  <div class="input-left" style="display: flex; gap: 8px; margin-bottom: 4px;">
    <!-- 파일 업로드 인풋 (Hidden) -->
    <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileUpload(event)">
  </div>
  <div class="input-wrapper" style="flex: 1; min-height: 36px; display: flex; align-items: center;">
    <textarea 
      class="input-field" 
      id="messageInput" 
      placeholder="메시지를 입력하세요..."
      rows="1"
      onkeydown="handleKeyPress(event)"
      oninput="onTextareaInput(this)"
      style="width: 100%; border: none; background: transparent; outline: none; font-size: 1.15rem; color: var(--text-main); font-family: 'DOSSaemmul', sans-serif; resize: none; padding: 8px 0; max-height: 120px;"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" style="background: var(--hari-pink); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-bottom: 2px;">↵</button>
</div>
