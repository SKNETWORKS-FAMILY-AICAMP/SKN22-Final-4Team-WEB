{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="안녕! 드디어 나랑 편하게 대화할 수 있는 우리만의 공간이 생겼어. SNS에선 못 했던 솔직한 이야기들, 여기서 다 들려줄게! 지금 로그인하고 들어오면 하리가 먼저 말을 걸어줄지도 몰라. 우리 여기서 만날까?">
<meta property="og:title" content="Hari — 로그인">
<meta property="og:description" content="안녕! 드디어 나랑 편하게 대화할 수 있는 우리만의 공간이 생겼어. SNS에선 못 했던 솔직한 이야기들, 여기서 다 들려줄게! 지금 로그인하고 들어오면 하리가 먼저 말을 걸어줄지도 몰라. 우리 여기서 만날까?">
<meta property="og:type" content="website">
<title>Hari — 로그인</title>
<link rel="icon" type="image/png" href="{% static 'images/hari_favicon.png' %}?v=2">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_eight@1.0/DOSSaemmul.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<script src="{% static 'js/theme.js' %}"></script>
<!-- v3.0 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --f-pixel:'DOSSaemmul',sans-serif;
  --f-neo:'NeoDunggeunmo',sans-serif;
  --bg:#ffffff;--ink:#2a2420;--acc:#ff7b8a;--dim:#9e9490;
  --bdr:rgba(255,123,138,0.12);--bdr2:rgba(255,123,138,0.22);
  --grn:#06d6a0;
}

/* 다크 모드 */
html[data-theme="dark"]{
  --bg:#1a1612;--ink:#f5f1ed;--acc:#ff8a9b;--dim:#9a8f87;
  --bdr:rgba(255,123,138,0.15);--bdr2:rgba(255,123,138,0.25);
  --grn:#1ee0a6;
}

html,body{height:100%;overflow-x:hidden;}
body{background:linear-gradient(135deg, #fff5f6 0%, #f0e6ff 50%, #e6f5ff 100%);color:var(--ink);font-family:'Jua','Apple SD Gothic Neo','Noto Sans KR',sans-serif !important;letter-spacing:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;display:flex;flex-direction:column;min-height:100vh;max-width:100vw;}
html[data-theme="dark"] body{background:linear-gradient(135deg, #251d1a 0%, #2a2420 50%, #1f1a16 100%);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--acc);border-radius:3px;}

/* LAYOUT */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}

/* LEFT — 이미지 패널 (숨김) */
.auth-left{display:none;}
.auth-left-logo img{height:48px;width:auto;filter:brightness(0) invert(1);}
.auth-left-title{font-family:var(--f-neo);font-size:clamp(2rem,4vw,3.5rem);color:#fff;line-height:1.1;margin-bottom:.8rem;}
.auth-left-sub{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.65);}

/* RIGHT — 폼 패널 */
.auth-right{display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:3.5rem 2.5rem;box-shadow:0 8px 32px rgba(255,123,138,0.15);max-width:450px;border:1px solid rgba(255,255,255,0.5);}
.auth-form-wrap{width:100%;max-width:400px;}

.auth-form-title{font-family:'Jua',sans-serif;font-size:2.1rem;font-weight:400;color:var(--ink);margin-bottom:.6rem;letter-spacing:.03em;}
.auth-form-sub{font-family:'Jua',sans-serif;font-size:1rem;color:var(--dim);margin-bottom:2rem;line-height:1.8;font-weight:300;}

/* Social */
.social-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.5rem;}
.social-btn{display:flex;align-items:center;justify-content:center;gap:.7rem;width:100%;padding:.9rem;border:none;background:rgba(255,255,255,0.8);color:var(--ink);font-family:'Jua',sans-serif;font-size:1rem;cursor:pointer;transition:all .3s;font-weight:500;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.social-btn:hover{background:rgba(255,123,138,0.08);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,123,138,0.2);}
.social-btn.naver{background:#03C75A;border-color:#03C75A;color:#fff;}
.social-btn.naver:hover{background:#02b350;border-color:#02b350;}

/* Divider */
.auth-divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;color:var(--dim);}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:.5px;background:var(--bdr);}

/* Fields */
.auth-field{display:flex;flex-direction:column;margin-bottom:1rem;}
.auth-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem;font-weight:500;}
.auth-inp{background:rgba(255,255,255,0.7);border:1.5px solid rgba(255,123,138,0.2);color:var(--ink);font-family:'Jua',sans-serif;font-size:1rem;padding:.95rem 1.1rem;outline:none;width:100%;transition:all .3s;line-height:1.5;border-radius:12px;}
.auth-inp::placeholder{color:rgba(158,148,144,0.5);}
.auth-inp:focus{background:rgba(255,255,255,0.95);border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,123,138,0.1);}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;color:var(--dim);font-size:.7rem;font-family:'DM Mono',monospace;letter-spacing:.08em;}

/* Error */
.auth-error{background:rgba(255,123,138,0.08);border:.5px solid rgba(255,123,138,0.3);color:var(--acc);font-size:.78rem;padding:.65rem .9rem;margin-bottom:1rem;display:none;}
.auth-error.show{display:block;}

/* Forgot */
.auth-forgot-row{display:flex;justify-content:flex-end;margin-bottom:1.2rem;}
.auth-forgot{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--dim);background:transparent;border:none;border-bottom:.5px solid var(--bdr2);cursor:pointer;transition:color .2s,border-color .2s;padding:0;font-weight:500;}
.auth-forgot:hover{color:var(--ink);border-bottom-color:var(--ink);}

/* Submit */
.auth-submit{background:linear-gradient(135deg, #ff7b8a 0%, #ff5c73 100%);border:none;color:#fff;font-family:'Jua',sans-serif;font-size:1.05rem;letter-spacing:.04em;padding:1.1rem;cursor:pointer;width:100%;transition:all .3s;margin-bottom:1.2rem;font-weight:600;border-radius:12px;box-shadow:0 4px 15px rgba(255,123,138,0.4);}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,123,138,0.5);}
.auth-submit:active{transform:translateY(0);}
.auth-submit:disabled{opacity:.6;cursor:not-allowed;}

/* Switch */
.auth-switch{text-align:center;font-family:'Jua',sans-serif;font-size:.95rem;color:var(--dim);line-height:1.8;}
.auth-switch a{color:var(--acc);text-decoration:none;border-bottom:.5px solid var(--acc);}
.auth-switch a:hover{color:var(--ink);}

/* Home link */
.auth-home{display:block;text-align:center;margin-top:1.5rem;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;}
.auth-home:hover{color:var(--acc);}

@media(max-width:768px){
  .auth-wrap{grid-template-columns:1fr;}
  .auth-left{display:none;}
  .auth-right{padding:3rem 1.5rem;}
  .auth-form-wrap{max-width:100%;}
}
@media(max-width:480px){
  .auth-right{padding:2rem 1.2rem;}
  .auth-form-title{font-size:1.5rem;}
  .social-row{grid-template-columns:1fr;}
  .social-btn{padding:.75rem;font-size:.95rem;}
  .auth-inp{font-size:.95rem;padding:.75rem .8rem;}
  .auth-submit{padding:.9rem;font-size:.95rem;}
}
@media(max-width:360px){
  .auth-right{padding:1.5rem 1rem;}
  .auth-form-title{font-size:1.15rem;}
  .auth-form-sub{font-size:.78rem;}
}
</style>
</head>
<body>

<div class="auth-wrap">
  <!-- LEFT: 이미지 -->
  <div class="auth-left">
    <a class="auth-left-logo" href="/">
      <img src="{% static 'images/hari_logo_none.png' %}?v=2" alt="HARI">
    </a>
    <div class="auth-left-bottom">
      <div class="auth-left-title">하리와<br>함께해요</div>
      <div class="auth-left-sub">보리 팬클럽 · Hari Official Login</div>
    </div>
  </div>

  <!-- RIGHT: 폼 -->
  <div class="auth-right">
    <div class="auth-form-wrap">
      <div class="auth-form-title" style="font-size:2.2rem !important; margin-bottom:1rem !important;">로그인</div>
      <p class="auth-form-sub" style="font-size:1.1rem !important; line-height:1.8 !important;">보리 팬클럽에 다시 오셨군요 ✨</p>

      <!-- Social -->
      <div class="social-row">
        <button class="social-btn" type="button" onclick="socialLogin('google')">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <button class="social-btn naver" type="button" onclick="socialLogin('naver')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.27 12.96L7.4 0H0v24h7.73V11.04L16.6 24H24V0h-7.73z"/></svg>
          Naver
        </button>
      </div>

      <div class="auth-divider">또는 이메일로 로그인</div>

      <div id="auth-error" class="auth-error"></div>

      <div class="auth-field">
        <label class="auth-label" style="font-size:0.65rem !important;">이메일</label>
        <input class="auth-inp" id="login-email" type="email" placeholder="hello@hari.kr" autocomplete="email" style="font-size:1.05rem !important; padding:0.9rem !important;">
      </div>
      <div class="auth-field">
        <label class="auth-label" style="font-size:0.65rem !important;">비밀번호</label>
        <div class="pw-wrap">
          <input class="auth-inp" id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password" style="font-size:1.05rem !important; padding:0.9rem !important;">
          <button class="pw-toggle" type="button" onclick="togglePw('login-pw',this)">표시</button>
        </div>
      </div>

      <div class="auth-forgot-row">
        <button class="auth-forgot" type="button" onclick="alert('관리자에게 문의해주세요.')">비밀번호를 잊으셨나요?</button>
      </div>

      <button class="auth-submit" id="login-btn" type="button" onclick="doLogin()" style="font-size:1.1rem !important; padding:1.05rem !important; font-weight:600;">로그인 →</button>

      <div class="auth-switch">
        아직 계정이 없으신가요? <a href="{% url 'signup_page' %}">회원가입</a>
      </div>

      <a class="auth-home" href="/">← 홈으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
function getCookie(name){
  const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return v ? v.pop() : '';
}

function togglePw(id, btn){
  const inp = document.getElementById(id);
  if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = '숨기기'; }
  else { inp.type = 'password'; btn.textContent = '표시'; }
}

function showError(msg){
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(){
  document.getElementById('auth-error').classList.remove('show');
}

function socialLogin(provider){
  window.location.href = '/accounts/' + provider + '/login/?process=login';
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const btn   = document.getElementById('login-btn');

  hideError();
  if(!email || !pw){ showError('이메일과 비밀번호를 입력해주세요.'); return; }

  btn.textContent = '로그인 중...';
  btn.disabled = true;

  fetch('/api/auth/login/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCookie('csrftoken'),
    },
    body: JSON.stringify({ email: email, password: pw }),
  })
  .then(r => {
    if(!r.ok) return r.json().then(d => { throw d; });
    return r.json();
  })
  .then(() => {
    sessionStorage.removeItem('hari-mypage-withdrawal-state');
    window.location.href = '/';
  })
  .catch(err => {
    btn.textContent = '로그인 →';
    btn.disabled = false;
    const msg = err.non_field_errors ? err.non_field_errors[0]
              : err.email            ? err.email[0]
              : '이메일 또는 비밀번호가 올바르지 않습니다.';
    showError(msg);
  });
}
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
